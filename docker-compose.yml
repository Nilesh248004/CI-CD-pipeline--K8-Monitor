services:
  web:
    build: .
    container_name: cicd-k8s-monitoring-app
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - APP_NAME=CI/CD Kubernetes Monitoring App

  prometheus:
    image: prom/prometheus:latest
    container_name: cicd-k8s-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      - web
